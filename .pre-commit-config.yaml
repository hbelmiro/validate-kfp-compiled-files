# See https://pre-commit.com for more information
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check .
        language: system
        pass_filenames: false

      - id: ty
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
