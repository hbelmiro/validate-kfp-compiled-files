name: fix-dependabot-requirements

on:
  pull_request:
    paths: ['uv.lock', 'pyproject.toml']

concurrency:
  group: fix-dependabot-requirements-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  update-requirements:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ github.token }}
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Regenerate requirements.txt
        shell: bash
        run: uv export --package integration-env --format requirements-txt --no-emit-project -o tests/integration/requirements.txt

      - name: Check if requirements.txt changed
        id: check_changes
        shell: bash
        run: |
          if ! git diff --quiet tests/integration/requirements.txt; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Requirements.txt needs to be updated"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Requirements.txt is already in sync"
          fi

      - name: Commit updated requirements.txt
        if: steps.check_changes.outputs.changed == 'true'
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Dependabot Requirements Updater"
          git add tests/integration/requirements.txt
          git commit -m "Auto-update integration requirements.txt"
          git push origin "HEAD:${HEAD_REF}"
